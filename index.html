<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聽說讀寫練習室</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/pinyin-pro"></script>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --warning: #f1c40f; --bg: #f8f9fa; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        #app { max-width: 850px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .header { text-align: center; margin-bottom: 20px; }
        .nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-lvl { padding: 10px 15px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        .btn-lvl.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        .guide { background: #eef6ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 15px; border-left: 5px solid var(--primary); line-height: 1.6; }
        
        .audio-zone { background: #f1f3f5; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .btn-main { background: var(--primary); color: white; padding: 12px 25px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        .btn-ctrl { background: #6c757d; color: white; padding: 8px 15px; border: none; border-radius: 5px; margin: 0 5px; cursor: pointer; }
        
        textarea { width: 100%; height: 150px; padding: 15px; font-size: 18px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; resize: none; outline: none; }
        textarea:focus { border-color: var(--primary); }
        
        .results-container { margin-top: 50px; line-height: 4.5; font-size: 26px; user-select: none; }
        .word-unit { position: relative; display: inline-block; margin: 0 4px; }
        
        /* 文字狀態 */
        .char-correct { color: #333; cursor: pointer; }
        .char-wrong { color: var(--error); font-weight: bold; cursor: pointer; border-bottom: 2px solid var(--error); }
        .char-variant { color: var(--warning); cursor: pointer; border-bottom: 2px solid var(--warning); }
        .char-punc { color: #ccc; cursor: default; }

        /* 對比框：只有在點擊時顯示 (active class) */
        .error-tag {
            position: absolute; bottom: 115%; left: 50%; transform: translateX(-50%);
            background: #fff; border: 2px solid #333; border-radius: 8px;
            padding: 6px 12px; white-space: nowrap; font-size: 14px; line-height: 1.4;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2); z-index: 20;
            display: none; /* 預設隱藏 */
        }
        .word-unit.show-info .error-tag { display: block; }
        
        .tag-input { color: var(--error); text-decoration: line-through; font-weight: bold; }
        .tag-correct { color: var(--success); font-weight: bold; font-size: 18px; }

        /* 拼音氣泡 */
        .popover {
            position: absolute; top: 110%; left: 50%; transform: translateX(-50%);
            background: #333; color: #fff; text-align: center;
            border-radius: 6px; padding: 8px; z-index: 10;
            font-size: 14px; line-height: 1.4; pointer-events: none;
            display: none;
        }
        .word-unit.show-info .popover { display: block; }
        
        .score-display { text-align: center; color: var(--primary); font-size: 24px; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <h1>聽說讀寫練習室</h1>
    </div>

    <div class="nav">
        <button v-for="n in 6" :key="n" @click="changeLevel(n-1)" :class="['btn-lvl', { active: currentIdx === n-1 }]">
            第 {{ n }} 題
        </button>
    </div>

    <div class="guide">
        💡 <strong>使用說明：</strong><br>
        1. 聽音檔並打下漢字。繳交後，系統會標示正確與否。<br>
        2. <strong>點擊</strong> 任何漢字：會播放發音並顯示該字的<b>詳細比對、拼音與翻譯</b>。
    </div>

    <div class="audio-zone">
        <div style="margin-bottom: 15px;">
            <button class="btn-ctrl" @click="skip(-5)">⏪ -5s</button>
            <button class="btn-main" @click="togglePlay">{{ isPlaying ? '⏸ 暫停' : '▶ 播放' }}</button>
            <button class="btn-ctrl" @click="skip(5)">⏩ 前進 5s</button>
        </div>
        <div>
            速度：
            <button v-for="s in [0.5, 0.75, 1.0]" @click="setSpeed(s)" :class="['btn-lvl', { active: playbackRate === s }]" style="padding:4px 10px; font-size:13px; margin:0 3px;">{{s}}x</button>
        </div>
        <audio ref="player" :src="`q${currentIdx+1}.mp3`" @play="isPlaying=true" @pause="isPlaying=false"></audio>
    </div>

    <div v-if="!submitted">
        <textarea v-model="userInput" placeholder="在此輸入你聽到的內容..."></textarea>
        <div style="text-align:center; margin-top:15px;">
            <button class="btn-main" @click="submitAnswer" style="background:var(--success)">繳交答案並檢查</button>
        </div>
    </div>

    <div v-else class="results-container">
        <div class="score-display">得分：{{ score }}%</div>
        
        <div class="text-display">
            <span v-for="(item, i) in diffResults" :key="i" 
                  class="word-unit" 
                  :class="{ 'show-info': activeCharIdx === i }"
                  @click="handleCharClick(i, item)">
                
                <div v-if="item.type === 'wrong'" class="error-tag">
                    <span class="tag-input">{{ item.input || '未填' }}</span> → <span class="tag-correct">{{ item.target }}</span>
                </div>
                <div v-if="item.type === 'variant'" class="error-tag" style="border-color:var(--warning)">
                    <span style="color:var(--warning)">繁簡不同：{{ item.input }} → {{ item.target }}</span>
                </div>

                <span :class="getCharClass(item)">
                    {{ item.display }}
                </span>

                <div class="popover" v-if="item.type !== 'punc'">
                    <strong>{{ item.target }}</strong><br>
                    拼音：{{ item.pinyin }}<br>
                    {{ item.trans ? '翻譯：' + item.trans : '（點擊聽音）' }}
                </div>
            </span>
        </div>

        <div style="text-align:center; margin-top:50px;">
            <button class="btn-lvl" @click="reset">重新挑戰</button>
            <button class="btn-main" @click="nextLevel" v-if="currentIdx < 5" style="margin-left:15px;">下一題</button>
        </div>
    </div>
</div>

<script>
const { createApp, ref } = Vue;
const { pinyin } = pinyinPro;

const variants = { '体':'體', '国':'國', '说':'說', '这':'這', '么':'麼', '系':'係', '学':'學', '门':'門', '再':'在', '你':'妳', '妳':'你', '面':'麵' };

createApp({
    setup() {
        const quizData = [
            { text: "羅珊蒂，下課啦！怎麼樣？你們班上有我們上個學期的同學嗎？", trans: { "下課": "finish class", "學期": "semester", "同學": "classmate" } },
            { text: "沒有，都沒有。你們班怎麼樣？", trans: { "沒有": "none", "怎麼樣": "how is it" } },
            { text: "都是新生，我一個也不認識，而且只有我一個男的。", trans: { "新生": "new student", "認識": "know" } },
            { text: "老師呢？老師怎麼樣？", trans: { "老師": "teacher" } },
            { text: "老師很嚴。他說我們這學期除了每一課的口試、筆試以外還要做兩次口頭報告，我覺得壓力好大。你們班呢？", trans: { "嚴": "strict", "壓力": "stress" } },
            { text: "老師的說明很清楚，同學也很熱情。我們今天就一起去吃中飯了。", trans: { "說明": "explanation", "熱情": "enthusiastic" } }
        ];

        const currentIdx = ref(0);
        const userInput = ref("");
        const submitted = ref(false);
        const isPlaying = ref(false);
        const playbackRate = ref(1.0);
        const player = ref(null);
        const diffResults = ref([]);
        const score = ref(0);
        const activeCharIdx = ref(null); // 控制目前哪一個字顯示詳情

        const togglePlay = () => { if (player.value.paused) player.value.play(); else player.value.pause(); };
        const setSpeed = (s) => { playbackRate.value = s; player.value.playbackRate = s; };
        const skip = (v) => { player.value.currentTime += v; };

        const submitAnswer = () => {
            const targetText = quizData[currentIdx.value].text;
            const cleanTarget = targetText.replace(/[^\u4e00-\u9fa5]/g, "");
            const cleanInput = userInput.value.replace(/[^\u4e00-\u9fa5]/g, "");
            let res = []; let inputPtr = 0; let correctCount = 0;

            for (let char of targetText) {
                if (/[^\u4e00-\u9fa5]/.test(char)) {
                    res.push({ display: char, type: 'punc', target: char });
                } else {
                    const tChar = char; const iChar = cleanInput[inputPtr] || "";
                    let type = 'wrong';
                    if (iChar === tChar) { type = 'correct'; correctCount++; }
                    else if (variants[iChar] === tChar || variants[tChar] === iChar) { type = 'variant'; correctCount++; }
                    res.push({ display: tChar, target: tChar, input: iChar, type: type, pinyin: pinyin(tChar, { toneType: 'symbol' }), trans: findTrans(tChar) });
                    inputPtr++;
                }
            }
            diffResults.value = res;
            score.value = Math.round((correctCount / cleanTarget.length) * 100);
            submitted.value = true;
        };

        const findTrans = (char) => {
            const dict = quizData[currentIdx.value].trans;
            for (let key in dict) { if (key.includes(char)) return dict[key]; }
            return "";
        };

        const handleCharClick = (idx, item) => {
            if (item.type === 'punc') return;
            // 如果點擊同一個字就收起來，點不同字就切換
            activeCharIdx.value = (activeCharIdx.value === idx) ? null : idx;
            speak(item.target);
        };

        const getCharClass = (i) => i.type === 'punc' ? 'char-punc' : `char-${i.type}`;
        const speak = (t) => { const u = new SpeechSynthesisUtterance(t); u.lang = 'zh-TW'; window.speechSynthesis.speak(u); };
        const changeLevel = (i) => { currentIdx.value = i; reset(); };
        const nextLevel = () => { currentIdx.value++; reset(); };
        const reset = () => { submitted.value = false; userInput.value = ""; activeCharIdx.value = null; if (player.value) { player.value.pause(); player.value.currentTime = 0; } };

        return { currentIdx, userInput, submitted, isPlaying, playbackRate, player, diffResults, score, activeCharIdx, togglePlay, setSpeed, skip, submitAnswer, getCharClass, speak, changeLevel, nextLevel, reset, handleCharClick };
    }
}).mount('#app');
</script>
</body>
</html>
