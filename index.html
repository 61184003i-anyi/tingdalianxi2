<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聽說讀寫練習室 - 識字挑戰</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/pinyin-pro"></script>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --warning: #f1c40f; --bg: #f8f9fa; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        #app { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .guide { background: #e7f3ff; padding: 15px; border-radius: 10px; font-size: 15px; color: #31708f; line-height: 1.6; margin-bottom: 25px; border-left: 5px solid var(--primary); }
        .level-nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; justify-content: center; }
        .btn-lvl { padding: 10px 15px; background: #eee; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-lvl.active { background: var(--primary); color: white; }
        
        .audio-section { background: #f1f3f5; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .control-btns { display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; }
        button { cursor: pointer; border-radius: 8px; border: none; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; padding: 12px 25px; font-size: 18px; }
        .btn-speed { background: #dee2e6; padding: 5px 10px; font-size: 14px; }
        .btn-speed.active { background: #495057; color: white; }

        textarea { width: 100%; height: 120px; padding: 15px; border: 2px solid #ced4da; border-radius: 10px; font-size: 18px; line-height: 1.6; box-sizing: border-box; margin-bottom: 15px; }
        
        .result-box { line-height: 2.5; font-size: 24px; border: 1px dashed #ccc; padding: 20px; border-radius: 10px; background: #fff; }
        .char-unit { position: relative; display: inline-block; margin: 0 2px; cursor: pointer; }
        .char-correct { color: #333; }
        .char-wrong { color: var(--error); border-bottom: 3px solid var(--error); font-weight: bold; }
        .char-variant { color: var(--warning); border-bottom: 3px solid var(--warning); }
        .char-punc { color: #aaa; cursor: default; }
        
        .popover { visibility: hidden; width: 140px; background: #333; color: #fff; text-align: center; border-radius: 6px; padding: 8px; position: absolute; z-index: 10; bottom: 125%; left: 50%; transform: translateX(-50%); opacity: 0; transition: opacity 0.3s; font-size: 14px; pointer-events: none; }
        .char-unit:hover .popover { visibility: visible; opacity: 1; }
        .score-info { text-align: center; color: var(--primary); font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .special-tip { color: #e67e22; font-weight: bold; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <h1>聽說讀寫練習室</h1>
        <p>建立字音與字形的橋樑</p>
    </div>

    <div class="level-nav">
        <button v-for="n in 6" :key="n" @click="changeLevel(n-1)" :class="['btn-lvl', { active: currentIdx === n-1 }]">
            {{ n }}
        </button>
    </div>

    <div class="guide">
        💡 <strong>練習說明：</strong> 請聆聽音檔並輸入漢字。標點符號不計分。點擊字可聽發音與看拼音。<br>
        <span v-if="currentIdx === 0" class="special-tip">⚠️ 第 1 題提示：人名（羅珊蒂、安德思）打錯沒關係，重點在練習後面的句子！</span>
    </div>

    <div class="audio-section">
        <div class="control-btns">
            <button @click="skip(-5)">⏪ -5s</button>
            <button class="btn-main" @click="togglePlay">{{ isPlaying ? '⏸ 暫停' : '▶ 播放' }}</button>
            <button @click="skip(5)">⏩ +5s</button>
        </div>
        <div class="btn-group control-btns">
            <button v-for="s in [0.5, 0.75, 1.0]" @click="setSpeed(s)" :class="['btn-speed', { active: playbackRate === s }]">{{ s }}x 速度</button>
        </div>
        <audio ref="player" :src="`q${currentIdx + 1}.mp3`" @play="isPlaying=true" @pause="isPlaying=false"></audio>
    </div>

    <div v-if="!submitted">
        <textarea v-model="userInput" placeholder="在此輸入你聽到的漢字內容..."></textarea>
        <div style="text-align:center;">
            <button class="btn-main" @click="checkAnswer" style="background:var(--success)">繳交答案</button>
        </div>
    </div>

    <div v-else>
        <div class="score-info">完成率：{{ score }}%</div>
        <div class="result-box">
            <span v-for="(item, i) in diffResults" :key="i" :class="['char-unit', getCharClass(item)]" @click="item.type!=='punc' && speak(item.target)">
                {{ item.display }}
                <div class="popover" v-if="item.type!=='punc'">
                    <strong>{{ item.target }}</strong><br>
                    {{ item.pinyin }}<br>
                    <small v-if="item.type==='wrong'">你打成：{{ item.input || '空' }}</small>
                </div>
            </span>
        </div>
        <div style="text-align:center; margin-top:20px;">
            <button class="btn-main" @click="nextLevel" v-if="currentIdx < 5">下一題</button>
            <button class="btn-main" @click="resetCurrent" v-else>全部完成！重新開始</button>
        </div>
    </div>
</div>

<script>
const { createApp, ref, computed } = Vue;
const { pinyin } = pinyinPro;

const variants = { '体':'體', '国':'國', '说':'說', '这':'這', '么':'麼', '系':'係', '学':'學', '门':'門', '再':'在' };

createApp({
    setup() {
        const quizData = [
            "羅珊蒂，下課啦！怎麼樣？你們班上有我們上個學期的同學嗎？",
            "沒有，都沒有。你們班怎麼樣？",
            "都是新生，我一個也不認識，而且只有我一個男的。",
            "老師呢？老師怎麼樣？",
            "老師很嚴。他說我們這學期除了每一課的口試、筆試以外還要做兩次口頭報告，我覺得壓力好大。你們班呢？",
            "老師的說明很清楚，同學也很熱情。我們今天就一起去吃中飯了。"
        ];

        const currentIdx = ref(0);
        const userInput = ref("");
        const submitted = ref(false);
        const isPlaying = ref(false);
        const playbackRate = ref(1.0);
        const player = ref(null);
        const diffResults = ref([]);
        const score = ref(0);

        const togglePlay = () => { if (player.value.paused) player.value.play(); else player.value.pause(); };
        const setSpeed = (s) => { playbackRate.value = s; player.value.playbackRate = s; };
        const skip = (v) => { player.value.currentTime += v; };

        const checkAnswer = () => {
            const fullTarget = quizData[currentIdx.value];
            const cleanTarget = fullTarget.replace(/[^\u4e00-\u9fa5]/g, "");
            const cleanInput = userInput.value.replace(/[^\u4e00-\u9fa5]/g, "");
            let res = []; let inputPtr = 0; let correctCount = 0;

            for (let char of fullTarget) {
                if (/[^\u4e00-\u9fa5]/.test(char)) { res.push({ display: char, type: 'punc', target: char }); }
                else {
                    const tChar = char; const iChar = cleanInput[inputPtr] || "";
                    let type = 'wrong';
                    if (iChar === tChar) { type = 'correct'; correctCount++; }
                    else if (variants[iChar] === tChar || variants[tChar] === iChar) { type = 'variant'; correctCount++; }
                    res.push({ display: tChar, target: tChar, input: iChar, type: type, pinyin: pinyin(tChar, { toneType: 'symbol' }) });
                    inputPtr++;
                }
            }
            diffResults.value = res;
            score.value = Math.round((correctCount / cleanTarget.length) * 100);
            submitted.value = true;
        };

        const changeLevel = (i) => { currentIdx.value = i; resetCurrent(); };
        const nextLevel = () => { currentIdx.value++; resetCurrent(); };
        const resetCurrent = () => { 
            submitted.value = false; userInput.value = ""; isPlaying.value = false;
            if (player.value) { player.value.pause(); player.value.currentTime = 0; }
        };
        const speak = (t) => { const u = new SpeechSynthesisUtterance(t); u.lang = 'zh-TW'; window.speechSynthesis.speak(u); };
        const getCharClass = (i) => i.type === 'punc' ? 'char-punc' : `char-${i.type}`;

        return { quizData, currentIdx, userInput, submitted, isPlaying, playbackRate, player, diffResults, score, togglePlay, setSpeed, skip, checkAnswer, changeLevel, nextLevel, resetCurrent, speak, getCharClass };
    }
}).mount('#app');
</script>
</body>
</html>
